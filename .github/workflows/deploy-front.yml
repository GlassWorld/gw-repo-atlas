name: Deploy Atlas Frontend

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".ai/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "프론트엔드 수동 배포 확인"
        required: true
        default: "yes"
      deploy_note:
        description: "배포 메모"
        required: false
        default: ""

concurrency:
  group: atlas-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.confirm_deploy == 'yes'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 배포 요청 정보 출력
        run: echo "수동 배포 메모=${{ github.event.inputs.deploy_note }}"

      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 이름 계산
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/repo-atlas:latest" >> "$GITHUB_OUTPUT"

      - name: Atlas 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/frontend/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}

      - name: 프론트엔드 서버 배포 경로 준비
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ${{ secrets.FRONT_USER }}
          key: ${{ secrets.FRONT_SSH_KEY }}
          port: ${{ secrets.FRONT_PORT }}
          command_timeout: 10m
          script: |
            APP_PATH='${{ secrets.FRONT_APP_PATH }}'
            mkdir -p "${APP_PATH}"

      - name: 프론트엔드 배포 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ${{ secrets.FRONT_USER }}
          key: ${{ secrets.FRONT_SSH_KEY }}
          port: ${{ secrets.FRONT_PORT }}
          source: "deploy/frontend/docker-compose.yml"
          target: ${{ secrets.FRONT_APP_PATH }}
          strip_components: 2

      - name: 서버 런타임 환경 파일 생성
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ${{ secrets.FRONT_USER }}
          key: ${{ secrets.FRONT_SSH_KEY }}
          port: ${{ secrets.FRONT_PORT }}
          command_timeout: 10m
          script: |
            APP_PATH='${{ secrets.FRONT_APP_PATH }}'
            {
              echo "IMAGE_NAME=${{ steps.image.outputs.name }}"
              echo "APP_DOMAIN=atlas.glassworld.co.kr"
              echo "APP_PORT=${{ secrets.ATLAS_APP_PORT || '3001' }}"
              echo "APP_BIND_IP=${{ secrets.ATLAS_APP_BIND_IP || '127.0.0.1' }}"
              echo "DATABASE_URL=${{ secrets.ATLAS_DATABASE_URL }}"
              echo "OPENAI_API_KEY=${{ secrets.ATLAS_OPENAI_API_KEY }}"
              echo "AUTH_JWT_SECRET=${{ secrets.ATLAS_AUTH_JWT_SECRET }}"
            } > "${APP_PATH}/.env"

      - name: 서버에 프론트엔드 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ${{ secrets.FRONT_USER }}
          key: ${{ secrets.FRONT_SSH_KEY }}
          port: ${{ secrets.FRONT_PORT }}
          command_timeout: 30m
          script: |
            APP_PATH='${{ secrets.FRONT_APP_PATH }}'
            COMPOSE_FILE="${APP_PATH}/docker-compose.yml"
            ENV_FILE="${APP_PATH}/.env"
            test -f "${COMPOSE_FILE}"
            test -f "${ENV_FILE}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" pull frontend
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" up -d
