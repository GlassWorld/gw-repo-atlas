services:
  frontend:
    image: ${IMAGE_NAME}
    container_name: repo-atlas-app
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${APP_PORT:-3001}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-3001}:${APP_PORT:-3001}"
